site_name: ЖК Севен — Плани квартир
site_url: https://flats.7-info.pp.ua
docs_dir: downloads

theme:
  name: material
  language: uk
  features:
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - content.tooltips
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html

not_in_nav: |
  CNAME
  SG7-Plans.zip
